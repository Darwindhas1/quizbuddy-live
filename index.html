<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizBuddy - Live Learning Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF8ED;
    --cream-2:#FFF1DC;
    --orange:#FF7A29;
    --orange-dark:#E8621A;
    --yellow:#FFC93C;
    --grape:#7C3AED;
    --berry:#D63384;
    --green:#2ECC71;
    --green-dark:#1E9E5A;
    --red:#FF4E4E;
    --red-dark:#D93636;
    --ink:#241C3D;
    --ink-soft:#5C5270;
    --white:#FFFFFF;
    --radius:20px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Nunito',sans-serif;
    background:var(--cream);
    color:var(--ink);
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }
  h1,h2,h3,.display{font-family:'Fredoka',sans-serif;}
  button{font-family:'Nunito',sans-serif;cursor:pointer;}
  .blob{
    position:fixed;
    border-radius:50%;
    filter:blur(2px);
    opacity:.35;
    z-index:0;
    pointer-events:none;
    animation:float 9s ease-in-out infinite;
  }
  @keyframes float{
    0%,100%{transform:translateY(0px) translateX(0px);}
    50%{transform:translateY(-22px) translateX(14px);}
  }
  @media (prefers-reduced-motion: reduce){
    .blob{animation:none;}
    *{animation-duration:.01ms !important; transition-duration:.01ms !important;}
  }
  #app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}
  .wrap{max-width:1000px;margin:0 auto;width:100%;padding:24px;flex:1;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;position:relative;z-index:2;}
  .logo{display:flex;align-items:center;gap:10px;font-family:'Fredoka',sans-serif;font-weight:700;font-size:22px;color:var(--ink);cursor:pointer;}
  .logo .dot{width:14px;height:14px;background:var(--orange);border-radius:50%;display:inline-block;box-shadow:5px 0 0 var(--yellow), -5px 0 0 var(--grape);margin-right:6px;}
  .btn{
    border:none;border-radius:14px;padding:12px 22px;font-weight:700;font-size:15px;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn:active{transform:scale(.96);}
  .btn-primary{background:var(--orange);color:var(--white);box-shadow:0 4px 0 var(--orange-dark);}
  .btn-primary:hover{filter:brightness(1.04);}
  .btn-primary:active{box-shadow:0 1px 0 var(--orange-dark);transform:translateY(3px) scale(.98);}
  .btn-ghost{background:var(--white);color:var(--ink);border:2px solid #EFE6D6;}
  .btn-ghost:hover{border-color:var(--orange);}
  .btn-yellow{background:var(--yellow);color:var(--ink);box-shadow:0 4px 0 #D9A61E;}
  .btn-yellow:active{box-shadow:0 1px 0 #D9A61E;transform:translateY(3px) scale(.98);}
  .btn-green{background:var(--green);color:var(--white);box-shadow:0 4px 0 var(--green-dark);}
  .btn-green:active{box-shadow:0 1px 0 var(--green-dark);transform:translateY(3px) scale(.98);}
  .btn-block{width:100%;}
  .btn-lg{padding:16px 28px;font-size:18px;border-radius:16px;}
  .btn:disabled{opacity:.5;cursor:not-allowed;}

  .card{background:var(--white);border-radius:var(--radius);padding:28px;border:2px solid #F3EAD9;}
  .center-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:20px;}

  /* landing */
  .hero-title{font-size:52px;font-weight:700;margin:0;line-height:1.05;}
  .hero-title span{color:var(--orange);}
  .hero-sub{font-size:18px;color:var(--ink-soft);max-width:480px;margin:0;font-weight:600;}
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .points-pill{background:#FFE7D3;color:var(--orange-dark);border-radius:999px;padding:8px 16px;font-weight:800;font-size:14px;}

  /* landing hero join pill */
  .hero-join{
    display:flex;align-items:center;gap:8px;background:var(--white);border:3px solid #F0E4CE;border-radius:999px;
    padding:8px 8px 8px 24px;width:100%;max-width:460px;box-shadow:0 10px 30px rgba(36,28,61,.08);
  }
  .hero-join:focus-within{border-color:var(--orange);}
  .hero-join input{
    flex:1;min-width:0;border:none;outline:none;background:transparent;color:var(--ink);
    font-size:20px;font-weight:600;font-family:'Fredoka',sans-serif;letter-spacing:3px;
  }
  .hero-join input::placeholder{letter-spacing:0;font-family:'Nunito',sans-serif;font-weight:700;color:var(--ink-soft);opacity:.75;font-size:16px;}
  .hero-join .btn{border-radius:999px;}

  /* section headers + card carousels */
  .section-head{display:flex;align-items:center;justify-content:space-between;margin:28px 0 14px;gap:10px;}
  .section-head h2{margin:0;}
  .carousel{display:flex;gap:14px;overflow-x:auto;padding:4px 4px 16px;scroll-snap-type:x mandatory;}
  .carousel-card{
    min-width:190px;max-width:190px;background:var(--white);border:2px solid #F3EAD9;border-radius:16px;
    overflow:hidden;scroll-snap-align:start;display:flex;flex-direction:column;
  }
  .carousel-thumb{height:92px;position:relative;flex-shrink:0;}
  .q-badge{position:absolute;top:8px;left:8px;background:rgba(255,255,255,.92);border-radius:999px;padding:3px 10px;font-size:12px;font-weight:800;color:var(--ink);}
  .carousel-title{padding:10px 12px;font-weight:800;font-size:15px;flex:1;}

  /* teacher nav */
  .teacher-nav{gap:14px;flex-wrap:wrap;}
  .nav-search{
    border:2px solid #F0E4CE;border-radius:999px;padding:10px 18px;font-size:14px;font-family:'Nunito',sans-serif;
    background:var(--white);color:var(--ink);flex:1;min-width:140px;max-width:280px;
  }
  .nav-search:focus{outline:none;border-color:var(--orange);}
  .nav-tabs{display:flex;gap:4px;background:var(--cream-2);border-radius:999px;padding:4px;}
  .nav-tab{border:none;background:transparent;border-radius:999px;padding:8px 16px;font-weight:800;font-size:14px;color:var(--ink-soft);}
  .nav-tab.active{background:var(--white);color:var(--ink);box-shadow:0 1px 4px rgba(36,28,61,.12);}

  /* discover hero cards */
  .hero-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:8px;}
  @media (max-width:700px){.hero-cards{grid-template-columns:1fr;}}
  .greeting-card{background:linear-gradient(135deg,var(--orange),#FFA05C);border:none;color:var(--white);}
  .greeting-card h3{margin:0 0 6px;}
  .mini-stats{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap;}
  .mini-stat{background:rgba(255,255,255,.2);border-radius:14px;padding:10px 18px;}
  .mini-stat .num{font-family:'Fredoka',sans-serif;font-size:24px;font-weight:700;}
  .mini-stat .lbl{font-size:12px;font-weight:700;opacity:.92;}

  /* code tiles */
  .code-tiles{display:flex;gap:10px;justify-content:center;}
  .code-tiles input{
    width:52px;height:64px;text-align:center;font-size:30px;font-weight:700;font-family:'Fredoka',sans-serif;
    border:3px solid #F0E4CE;border-radius:14px;background:var(--cream-2);color:var(--ink);
  }
  .code-tiles input:focus{outline:none;border-color:var(--orange);background:var(--white);}
  @media (max-width:480px){
    .code-tiles input{width:38px;height:50px;font-size:22px;}
    .hero-title{font-size:36px;}
  }

  .field{display:flex;flex-direction:column;gap:6px;text-align:left;margin-bottom:16px;}
  .field label{font-size:13px;font-weight:700;color:var(--ink-soft);}
  .field input, .field select, .field textarea{
    border:2px solid #F0E4CE;border-radius:12px;padding:12px 14px;font-size:16px;font-family:'Nunito',sans-serif;
    background:var(--cream-2);color:var(--ink);
  }
  .field input:focus, .field select:focus, .field textarea:focus{outline:none;border-color:var(--orange);background:var(--white);}

  .top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
  .badge{background:var(--cream-2);border-radius:999px;padding:6px 14px;font-weight:700;font-size:13px;color:var(--ink-soft);}
  .badge.orange{background:#FFE7D3;color:var(--orange-dark);}

  .quiz-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
  .quiz-card{background:var(--white);border:2px solid #F3EAD9;border-radius:16px;padding:18px;display:flex;flex-direction:column;gap:10px;}
  .quiz-card h3{margin:0;font-size:18px;}
  .quiz-card .meta{font-size:13px;color:var(--ink-soft);font-weight:700;}
  .stripe{height:8px;border-radius:6px;background:linear-gradient(90deg,var(--orange),var(--yellow));}

  .qbox{border:2px solid #F0E4CE;border-radius:16px;padding:16px;margin-bottom:12px;background:var(--cream-2);}
  .qbox-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .opt-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .opt-row input[type=text]{flex:1;}
  .opt-row input[type=radio]{width:20px;height:20px;accent-color:var(--green);}
  .icon-btn{background:none;border:none;color:var(--red);font-weight:700;font-size:13px;}

  /* game code display */
  .code-display{display:flex;gap:12px;justify-content:center;margin:10px 0;flex-wrap:wrap;}
  .code-display .digit{
    width:64px;height:80px;background:var(--white);border:3px solid var(--orange);border-radius:16px;
    display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:700;font-family:'Fredoka',sans-serif;
    color:var(--orange-dark);
  }

  .player-chip{background:var(--white);border:2px solid #F3EAD9;border-radius:999px;padding:8px 16px;font-weight:700;display:inline-flex;align-items:center;gap:8px;}
  .player-list{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:18px 0;}

  /* progress pill */
  .progress-pill{background:var(--ink);color:var(--white);border-radius:999px;padding:6px 18px;font-weight:700;font-size:13px;display:inline-block;margin-bottom:-16px;position:relative;z-index:2;}
  .question-banner{background:var(--white);border-radius:18px;padding:34px 24px 22px;text-align:center;border:2px solid #F3EAD9;}
  .question-text{font-size:26px;font-weight:700;font-family:'Fredoka',sans-serif;margin:0;}
  .timer-bar-track{height:10px;background:#F0E4CE;border-radius:6px;overflow:hidden;margin-top:16px;}
  .timer-bar-fill{height:100%;background:var(--orange);border-radius:6px;transition:width 1s linear;}

  .answer-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:22px;}
  @media (max-width:600px){.answer-grid{grid-template-columns:1fr;}}
  .answer-card{
    border:none;border-radius:18px;padding:28px 18px;min-height:110px;color:var(--white);font-size:19px;font-weight:700;
    display:flex;align-items:center;justify-content:center;text-align:center;transition:transform .12s ease, opacity .12s ease;
    font-family:'Fredoka',sans-serif;
  }
  .answer-card:active{transform:scale(.97);}
  .answer-card:disabled{opacity:.5;}
  .ac-0{background:linear-gradient(135deg,#FF7A29,#E8621A);}
  .ac-1{background:linear-gradient(135deg,#7C3AED,#5B21B6);}
  .ac-2{background:linear-gradient(135deg,#2ECC71,#1E9E5A);}
  .ac-3{background:linear-gradient(135deg,#D63384,#A02460);}
  .answer-card.correct{background:linear-gradient(135deg,#2ECC71,#1E9E5A) !important;}
  .answer-card.wrong{background:linear-gradient(135deg,#FF4E4E,#D93636) !important;}

  .feedback-banner{
    position:fixed;left:0;right:0;bottom:0;padding:22px;text-align:center;font-size:20px;font-weight:700;
    color:var(--white);z-index:50;
  }
  .feedback-banner.ok{background:var(--green);}
  .feedback-banner.no{background:var(--red);}

  .stat-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin:18px 0;}
  .stat-card{background:var(--white);border:2px solid #F3EAD9;border-radius:16px;padding:16px 22px;text-align:center;min-width:100px;}
  .stat-card .num{font-size:26px;font-weight:700;font-family:'Fredoka',sans-serif;color:var(--orange-dark);}
  .stat-card .lbl{font-size:12px;color:var(--ink-soft);font-weight:700;}

  .leaderboard{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:10px;max-width:480px;width:100%;}
  .lb-row{display:flex;align-items:center;gap:14px;background:var(--white);border:2px solid #F3EAD9;border-radius:14px;padding:12px 18px;}
  .lb-rank{width:32px;height:32px;border-radius:50%;background:var(--cream-2);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;}
  .lb-rank.gold{background:var(--yellow);}
  .lb-rank.silver{background:#DADFE6;}
  .lb-rank.bronze{background:#E7B98B;}
  .lb-name{flex:1;font-weight:700;text-align:left;}
  .lb-score{font-weight:700;color:var(--orange-dark);font-family:'Fredoka',sans-serif;}

  .streak-pop{display:inline-flex;align-items:center;gap:4px;background:#FFE7D3;color:var(--orange-dark);padding:4px 10px;border-radius:999px;font-size:13px;font-weight:700;}
  .small-link{background:none;border:none;color:var(--ink-soft);font-weight:700;font-size:14px;text-decoration:underline;}
  .err{color:var(--red-dark);font-weight:700;font-size:14px;min-height:18px;}
  .helper-note{font-size:12px;color:var(--ink-soft);font-weight:600;max-width:400px;}
  .spinner{width:34px;height:34px;border:4px solid #F0E4CE;border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="blob" style="width:260px;height:260px;background:var(--orange);top:-60px;left:-60px;"></div>
<div class="blob" style="width:200px;height:200px;background:var(--yellow);top:20%;right:-70px;animation-delay:2s;"></div>
<div class="blob" style="width:180px;height:180px;background:var(--grape);bottom:-40px;left:15%;animation-delay:4s;"></div>
<div class="blob" style="width:150px;height:150px;background:var(--green);bottom:10%;right:10%;animation-delay:1s;"></div>

<div id="app"></div>

<script src="src/sample-quizzes.js"></script>
<script>
/* ---------------- storage helpers ---------------- */
async function sGet(key){
  try{ const r = await window.storage.get(key, true); return r ? JSON.parse(r.value) : null; }
  catch(e){ return null; }
}
async function sSet(key, val){
  try{ return await window.storage.set(key, JSON.stringify(val), true); }
  catch(e){ console.error('storage set failed', e); return null; }
}
async function sList(prefix){
  try{ const r = await window.storage.list(prefix, true); return r ? r.keys : []; }
  catch(e){ return []; }
}
function genCode(){ return String(Math.floor(100000 + Math.random()*900000)); }
function genId(){ return 'p' + Math.random().toString(36).slice(2,10); }
function esc(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ---------------- app state ---------------- */
const App = {
  screen:'landing',
  playerId: genId(),
  playerName:'',
  quizzes:[],
  editingQuiz:null,
  gameCode:null,
  game:null,
  players:[],
  quizForGame:null,
  pollTimer:null,
  answeredThisQ:false,
  lastCorrect:null,
  questionDeadline:null,
  countdownTimer:null,
  timeLeft:15,
  loading:false,
  error:'',
  sessionPoints:0,
  hasHosted:false,
  discoverFilter:'',
  hostCounts:{},
  landingQuizzes:null,
  heroCode:''
};
const QUESTION_SECONDS = 15;

function stopPolling(){
  if(App.pollTimer){ clearInterval(App.pollTimer); App.pollTimer = null; }
  if(App.countdownTimer){ clearInterval(App.countdownTimer); App.countdownTimer = null; }
}
function goto(screen){ stopPolling(); App.error=''; App.screen = screen; render(); }

/* ---------------- data ops ---------------- */
async function loadQuizIndex(){
  const idx = await sGet('quiz-index');
  return idx || [];
}
async function saveNewQuiz(quiz){
  await sSet('quiz-'+quiz.id, quiz);
  const idx = await loadQuizIndex();
  idx.unshift({id:quiz.id, title:quiz.title, count:quiz.questions.length});
  await sSet('quiz-index', idx);
}
async function updateQuiz(quiz){
  await sSet('quiz-'+quiz.id, quiz);
  const idx = await loadQuizIndex();
  const updated = idx.map(q => q.id===quiz.id ? {id:quiz.id,title:quiz.title,count:quiz.questions.length} : q);
  await sSet('quiz-index', updated);
}
async function loadQuiz(id){ return await sGet('quiz-'+id); }
async function seedSampleQuizzes(){
  const samples = window.SAMPLE_QUIZZES || [];
  if(!samples.length) return;
  const idx = await loadQuizIndex();
  const have = new Set(idx.map(q=>q.id));
  const missing = samples.filter(s=>!have.has(s.id));
  if(!missing.length) return;
  for(const s of missing){ await sSet('quiz-'+s.id, s); }
  const merged = idx.concat(missing.map(s=>({id:s.id, title:s.title, count:s.questions.length})));
  await sSet('quiz-index', merged);
}

async function createGame(quizId){
  let code = genCode();
  const state = {quizId, status:'lobby', currentQ:-1, questionStartedAt:null, createdAt:Date.now()};
  await sSet('game-'+code, state);
  return code;
}
async function getGame(code){ return await sGet('game-'+code); }
async function setGame(code, patch){
  const cur = (await getGame(code)) || {};
  const next = Object.assign({}, cur, patch);
  await sSet('game-'+code, next);
  return next;
}
async function joinGame(code, playerId, name){
  await sSet('player-'+code+'-'+playerId, {name, score:0, streak:0, joinedAt:Date.now()});
}
async function listPlayers(code){
  const keys = await sList('player-'+code+'-');
  const out = [];
  for(const k of keys){
    try{ const r = await window.storage.get(k, true); if(r) out.push(Object.assign({id:k}, JSON.parse(r.value))); }
    catch(e){}
  }
  return out.sort((a,b)=>b.score-a.score);
}
async function submitAnswer(code, qIndex, playerId, optionIndex){
  await sSet('ans-'+code+'-'+qIndex+'-'+playerId, {optionIndex, at:Date.now()});
}
async function countAnswers(code, qIndex){
  const keys = await sList('ans-'+code+'-'+qIndex+'-');
  return keys.length;
}
async function updatePlayerScore(code, playerId, patch){
  const cur = await sGet('player-'+code+'-'+playerId) || {name:App.playerName, score:0, streak:0};
  const next = Object.assign({}, cur, patch);
  await sSet('player-'+code+'-'+playerId, next);
  return next;
}

/* ---------------- render root ---------------- */
function render(){
  const el = document.getElementById('app');
  el.innerHTML = topbarHTML() + '<div class="wrap">' + screenHTML() + '</div>';
  bindEvents();
}
function topbarHTML(){
  if(['discover','teacherDashboard','reports'].includes(App.screen)) return teacherNavHTML();
  const right = [];
  if(App.playerName) right.push(`<span class="points-pill">⭐ ${App.sessionPoints} pts</span>`);
  if(App.hasHosted) right.push('<button class="btn btn-ghost" id="navMyQuizzes">My quizzes</button>');
  return `<div class="topbar"><div class="logo" id="logoHome"><span class="dot"></span>QuizBuddy</div><div class="topbar-right">${right.join('')}</div></div>`;
}
function teacherNavHTML(){
  const tab = (id,label,screen)=>`<button class="nav-tab ${App.screen===screen?'active':''}" id="${id}">${label}</button>`;
  const search = App.screen==='discover'
    ? `<input type="text" class="nav-search" id="discoverSearch" placeholder="Find a quiz" aria-label="Find a quiz" value="${esc(App.discoverFilter)}">`
    : '';
  return `<div class="topbar teacher-nav">
    <div class="logo" id="logoHome"><span class="dot"></span>QuizBuddy</div>
    ${search}
    <div class="nav-tabs">${tab('navTabHome','Home','discover')}${tab('navTabMy','My quizzes','teacherDashboard')}${tab('navTabReports','Reports','reports')}</div>
    <button class="btn btn-primary" id="navCreateQuiz">+ Create a quiz</button>
  </div>`;
}

function screenHTML(){
  switch(App.screen){
    case 'landing': return landingHTML();
    case 'discover': return discoverHTML();
    case 'reports': return reportsHTML();
    case 'teacherDashboard': return teacherDashboardHTML();
    case 'quizEditor': return quizEditorHTML();
    case 'hostLobby': return hostLobbyHTML();
    case 'hostPlay': return hostPlayHTML();
    case 'hostResults': return hostResultsHTML();
    case 'playerJoin': return playerJoinHTML();
    case 'playerLobby': return playerLobbyHTML();
    case 'playerPlay': return playerPlayHTML();
    case 'playerResults': return playerResultsHTML();
    default: return '';
  }
}

/* ---------------- LANDING ---------------- */
function landingHTML(){
  return `
    <div class="center-screen" style="flex:0 0 auto;padding:26px 0 6px;">
      <div class="logo" style="font-size:26px;"><span class="dot"></span>QuizBuddy</div>
      <h1 class="hero-title">Learning that feels<br><span>like play</span> 🎉</h1>
      <p class="hero-sub">Teachers host a live quiz, kids join instantly with a 6&#8209;digit code, no accounts needed.</p>
      <div class="hero-join">
        <input type="text" id="heroCodeInput" inputmode="numeric" maxlength="6" placeholder="Enter a join code" aria-label="Enter a join code">
        <button class="btn btn-primary btn-lg" id="heroJoinBtn">Join</button>
      </div>

/* ---------------- HOST PLAY ---------------- */
async function hostAdvance(){
  const q = App.game.currentQ + 1;
  if(q >= App.quizForGame.questions.length){
    await setGame(App.gameCode, {status:'ended'});
  } else {
    await setGame(App.gameCode, {status:'question', currentQ:q, questionStartedAt:Date.now()});
  }
  App.game = await getGame(App.gameCode);
  render();
  hostPollLoop();
}
function hostPollLoop(){
  stopPolling();
  App.pollTimer = setInterval(async ()=>{
    if(App.screen!=='hostPlay'){ return; }
    App.players = await listPlayers(App.gameCode);
    const box = document.getElementById('hostAnswerCount');
    if(box && App.game.status==='question'){
      const n = await countAnswers(App.gameCode, App.game.currentQ);
      box.textContent = n + ' / ' + App.players.length + ' answered';
    }
  }, 1500);
}

/* ---------------- events ---------------- */
function bindQuizButtons(root){
  root.querySelectorAll('[data-host]').forEach(b=>b.addEventListener('click', ()=> startHosting(b.dataset.host)));
  root.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click', async ()=>{
    const q = await loadQuiz(b.dataset.edit); q.savedOnce = true; App.editingQuiz = q; goto('quizEditor');
  }));
}
function bindEvents(){
  const on = (id, evt, fn) => { const e = document.getElementById(id); if(e) e.addEventListener(evt, fn); };

  on('logoHome', 'click', ()=>{ App.gameCode=null; App.game=null; goto('landing'); refreshLandingCarousel(); });
  on('goTeacher', 'click', openDiscover);

  /* landing hero join */
  const heroInput = document.getElementById('heroCodeInput');
  if(heroInput){
    heroInput.addEventListener('input', ()=>{ heroInput.value = heroInput.value.replace(/[^0-9]/g,'').slice(0,6); });
    heroInput.addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ const b = document.getElementById('heroJoinBtn'); if(b) b.click(); } });
  }
  on('heroJoinBtn', 'click', ()=>{
    App.heroCode = heroInput ? heroInput.value : '';
    goto('playerJoin');
    if(App.heroCode.length===6){ const nick = document.getElementById('nickname'); if(nick) nick.focus(); }
  });
  on('seeAllQuizzes', 'click', openDiscover);
  on('navMyQuizzes', 'click', openDiscover);

  /* teacher nav */
  on('navTabHome', 'click', openDiscover);
  on('navTabMy', 'click', openTeacherDashboard);
  on('navTabReports', 'click', ()=> goto('reports'));
  on('navCreateQuiz', 'click', ()=>{ App.editingQuiz = newQuizDraft(); goto('quizEditor'); });
  const searchInput = document.getElementById('discoverSearch');
  if(searchInput){
    searchInput.addEventListener('input', ()=>{
      App.discoverFilter = searchInput.value;
      const box = document.getElementById('recentBox');
      if(box){ box.innerHTML = discoverRecentHTML(); bindQuizButtons(box); }
    });
  }

  /* discover quick host */
  on('quickHostBtn', 'click', ()=>{
    const sel = document.getElementById('quickHostSelect');
    if(sel && sel.value) startHosting(sel.value);
  });

  /* teacher dashboard */
  on('newQuiz', 'click', ()=>{ App.editingQuiz = newQuizDraft(); goto('quizEditor'); });
  bindQuizButtons(document);

  /* quiz editor */
  on('backToDash', 'click', openTeacherDashboard);
  on('addQuestion', 'click', ()=>{
    const text = document.getElementById('newQText').value.trim();
    const opts = [0,1,2,3].map(i=>document.getElementById('opt'+i).value.trim()).filter(v=>v);
    const correctRadio = document.querySelector('input[name=correctOpt]:checked');
    const correctIdx = correctRadio ? parseInt(correctRadio.value,10) : 0;
    const errBox = document.getElementById('errBox');
    if(!text || opts.length < 2){ errBox.textContent = 'Add a question and at least 2 answer options.'; return; }
    if(correctIdx >= opts.length){ errBox.textContent = 'Pick a correct answer among the options you filled in.'; return; }
    errBox.textContent = '';
    App.editingQuiz.questions.push({text, options:opts, correct:correctIdx});
    render();
  });
  document.querySelectorAll('[data-del-q]').forEach(b=>b.addEventListener('click', ()=>{
    App.editingQuiz.questions.splice(parseInt(b.dataset.delQ,10),1); render();
  }));
  on('saveQuiz', 'click', async ()=>{
    const title = document.getElementById('quizTitle').value.trim();
    const errBox = document.getElementById('errBox');
    if(!title){ errBox.textContent = 'Give your quiz a title.'; return; }
    if(!App.editingQuiz.questions.length){ errBox.textContent = 'Add at least one question before saving.'; return; }
    App.editingQuiz.title = title;
    if(App.editingQuiz.savedOnce){ await updateQuiz(App.editingQuiz); } else { App.editingQuiz.savedOnce = true; await saveNewQuiz(App.editingQuiz); }
    openTeacherDashboard();
  });

  /* host lobby */
  on('cancelHost', 'click', openDiscover);
  on('startGame', 'click', async ()=>{
    App.game = await setGame(App.gameCode, {status:'question', currentQ:0, questionStartedAt:Date.now()});
    goto('hostPlay');
    hostPollLoop();
  });

  /* host play */
  on('hostNext', 'click', async ()=>{
    const wasLast = App.game.currentQ >= App.quizForGame.questions.length - 1;
    await hostAdvance();
    if(wasLast){ await hostShowResults(); }
  });
  on('backToDashFromResults', 'click', openDiscover);

  /* player join code tiles */
  const digits = document.querySelectorAll('.codeDigit');
  digits.forEach(inp=>{
    inp.addEventListener('input', ()=>{
      inp.value = inp.value.replace(/[^0-9]/g,'').slice(0,1);
      if(inp.value){ const next = document.querySelector(`.codeDigit[data-i="${parseInt(inp.dataset.i,10)+1}"]`); if(next) next.focus(); }
    });
    inp.addEventListener('keydown', (e)=>{
      if(e.key==='Backspace' && !inp.value){ const prev = document.querySelector(`.codeDigit[data-i="${parseInt(inp.dataset.i,10)-1}"]`); if(prev) prev.focus(); }
    });
  });
  on('joinBtn', 'click', doJoinGame);

  /* player play answer buttons */
  document.querySelectorAll('.answer-card[data-opt]').forEach(b=>b.addEventListener('click', ()=> playerAnswer(parseInt(b.dataset.opt,10))));

  /* player results */
  on('playAgain', 'click', ()=>{ App.gameCode=null; App.game=null; App.players=[]; App.playerName=''; App.heroCode=''; goto('playerJoin'); });

  startTimerVisualsIfNeeded();
}

/* ---------------- join flow ---------------- */
async function doJoinGame(){
  const code = Array.from(document.querySelectorAll('.codeDigit')).map(i=>i.value).join('');
  const name = document.getElementById('nickname').value.trim();
  const errBox = document.getElementById('joinErr');
  if(code.length !== 6){ errBox.textContent = 'Enter the full 6-digit code.'; return; }
  if(!name){ errBox.textContent = 'Pick a nickname first.'; return; }
  errBox.textContent = '';
  const game = await getGame(code);
  if(!game){ errBox.textContent = "That code doesn't match a game right now."; return; }
  App.gameCode = code;
  App.playerName = name;
  const quiz = await loadQuiz(game.quizId);
  App.quizForGame = quiz;
  App.game = game;
  await joinGame(code, App.playerId, name);
  App.players = await listPlayers(code);
  goto('playerLobby');
  App.pollTimer = setInterval(playerPollTick, 1200);
}

async function playerPollTick(){
  if(!['playerLobby','playerPlay'].includes(App.screen)) return;
  const game = await getGame(App.gameCode);
  if(!game) return;
  App.players = await listPlayers(App.gameCode);
  if(App.screen==='playerLobby'){
    const box = document.getElementById('playerListBox2');
    if(box) box.innerHTML = playerChipsHTML();
    if(game.status==='question'){
      App.game = game; App.answeredThisQ = false;
      goto('playerPlay'); startTimerVisualsIfNeeded();
      App.pollTimer = setInterval(playerPollTick, 1200);
    }
  } else if(App.screen==='playerPlay'){
    if(game.currentQ !== App.game.currentQ || game.status !== App.game.status){
      App.game = game;
      if(game.status==='ended'){
        goto('playerResults');
      } else if(game.status==='question'){
        App.answeredThisQ = false;
        render();
      }
    }
  }
}

async function playerAnswer(optIndex){
  if(App.answeredThisQ) return;
  App.answeredThisQ = true;
  const q = App.quizForGame.questions[App.game.currentQ];
  const isCorrect = optIndex === q.correct;
  await submitAnswer(App.gameCode, App.game.currentQ, App.playerId, optIndex);
  const cur = await sGet('player-'+App.gameCode+'-'+App.playerId) || {name:App.playerName, score:0, streak:0};
  const newStreak = isCorrect ? (cur.streak||0) + 1 : 0;
  const speedBonus = App.timeLeft && App.timeLeft > 0 ? Math.round((App.timeLeft / QUESTION_SECONDS) * 400) : 0;
  const gained = isCorrect ? (600 + speedBonus + Math.min(newStreak * 40, 200)) : 0;
  App.sessionPoints += gained;
  await updatePlayerScore(App.gameCode, App.playerId, {score:(cur.score||0)+gained, streak:newStreak, name:App.playerName});

  document.querySelectorAll('.answer-card[data-opt]').forEach(b=>{
    b.disabled = true;
    const bi = parseInt(b.dataset.opt,10);
    if(bi === q.correct) b.classList.add('correct');
    else if(bi === optIndex) b.classList.add('wrong');
  });
  const banner = document.createElement('div');
  banner.className = 'feedback-banner ' + (isCorrect ? 'ok' : 'no');
  banner.innerHTML = isCorrect ? `✓ Correct! +${gained} pts ${newStreak>1 ? `<span class="streak-pop">🔥 ${newStreak} streak</span>` : ''}` : '✗ Not quite, keep going!';
  document.body.appendChild(banner);
  setTimeout(()=>{ banner.remove(); }, 1800);
  render();
}

function startTimerVisualsIfNeeded(){
  if(App.screen !== 'playerPlay' || !App.game || App.game.status !== 'question') return;
  if(App.countdownTimer) clearInterval(App.countdownTimer);
  const started = App.game.questionStartedAt || Date.now();
  function tick(){
    const elapsed = (Date.now() - started) / 1000;
    App.timeLeft = Math.max(0, QUESTION_SECONDS - elapsed);
    const fill = document.getElementById('timerFill');
    if(fill) fill.style.width = Math.max(0, (App.timeLeft / QUESTION_SECONDS) * 100) + '%';
    if(App.timeLeft <= 0){ clearInterval(App.countdownTimer); App.countdownTimer = null; }
  }
  tick();
  App.countdownTimer = setInterval(tick, 250);
}

render();
refreshLandingCarousel();
</script>
</body>
</html>
